<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>超級人格招募文案引擎 - 煥然專用版</title>
<style>
:root{
--bg:#07101d;
--card:rgba(255,255,255,.06);
--line:rgba(255,255,255,.12);
--gold:#d8b46a;
--gold2:#ffe7ad;
--blue:#8cdcff;
--text:#fff8ee;
--muted:#cfc2b0;
--shadow:0 30px 80px rgba(0,0,0,.45);
}
* { margin:0; padding:0; box-sizing:border-box; }
body{
font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",sans-serif;
background: radial-gradient(circle at top left, rgba(216,180,106,.2), transparent 30%),
            radial-gradient(circle at bottom right, rgba(140,220,255,.12), transparent 30%),
            linear-gradient(180deg,#07101d 0%,#101827 100%);
color:var(--text);
overflow-x:hidden;
}
.container { width:min(1250px,calc(100% - 40px)); margin:auto; }
nav{
position:sticky; top:0; z-index:100;
backdrop-filter:blur(20px);
background:rgba(5,8,14,.8);
border-bottom:1px solid var(--line);
}
.nav-inner{
height:74px; display:flex; align-items:center; justify-content:space-between;
}
.logo{
display:flex; align-items:center; gap:12px; font-weight:900; font-size:20px;
}
.logo-icon{
width:42px; height:42px; border-radius:14px;
background:linear-gradient(135deg,var(--gold2),var(--gold));
color:#111; font-weight:900; display:grid; place-items:center;
}
.hero{
padding:90px 0 60px;
display:grid; grid-template-columns:1fr 1fr; gap:40px; align-items:center;
}
.badge{
display:inline-flex; padding:8px 16px; border-radius:999px;
background:rgba(216,180,106,.12); border:1px solid rgba(216,180,106,.35);
color:var(--gold2); font-size:13px; font-weight:900; margin-bottom:22px;
}
h1{
font-size:clamp(48px,7vw,90px); line-height:1.03; letter-spacing:-4px; margin-bottom:22px;
}
.gradient{
background:linear-gradient(135deg,#fff,var(--gold),var(--blue));
-webkit-background-clip:text; color:transparent;
}
.btn-row{
display:flex; gap:12px; flex-wrap:wrap; margin-top:20px;
}
.btn{
padding:15px 26px; border-radius:999px; font-weight:900; border:none; cursor:pointer;
transition:.25s; font-size:15px;
}
.btn:hover{ transform:translateY(-3px); }
.btn-gold{
background:linear-gradient(135deg,var(--gold2),var(--gold)); color:#111;
}
.btn-dark{
background:rgba(255,255,255,.08); border:1px solid var(--line); color:white;
}
.panel{
background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.05));
border:1px solid rgba(255,255,255,.12); border-radius:36px;
padding:30px; box-shadow:var(--shadow); position:relative; overflow:hidden;
}
.output{
margin-top:22px; padding:26px; border-radius:28px;
background:rgba(0,0,0,.28); border:1px solid rgba(216,180,106,.2);
min-height:520px; white-space:pre-wrap; line-height:1.95; font-size:16.2px;
}
.status { color:#79ffb8; font-size:12px; font-weight:900; }
@media(max-width:980px){
.hero{ grid-template-columns:1fr; }
}
</style>
</head>
<body>
<nav>
<div class="container nav-inner">
<div class="logo">
<div class="logo-icon">U</div>
<div>超級人格招募文案引擎</div>
</div>
<button class="btn btn-gold" onclick="setHuanranMode()">煥然專屬模式</button>
</div>
</nav>

<section class="hero container">
<div>
<div class="badge">39歲翻身 × 銷售故事型 × AI時代 × 真實焦慮</div>
<h1>不是生成文案。<br>是生成<span class="gradient">讓「以前的我」心動的招募</span></h1>
<p>專為想翻身的人設計<br>每一篇都帶有你的故事溫度</p>
</div>

<div class="panel">
<div class="panel-top">
<div class="dots">● ● ●</div>
<div class="status">PERSONA RECRUIT ENGINE v2</div>
</div>

<label>人群定位</label>
<select id="audience">
<option value="想翻身的人">想翻身的人</option>
<option value="曾經失敗的人">曾經失敗的人</option>
<option value="業務型人格">業務型人格</option>
<option value="上班族">上班族</option>
<option value="迷茫的人">迷茫的人</option>
</select>

<label>情緒核心</label>
<select id="emotion">
<option value="不甘心">不甘心</option>
<option value="焦慮">焦慮</option>
<option value="想改變">想改變</option>
<option value="迷茫">迷茫</option>
</select>

<label>人格風格</label>
<select id="persona">
<option value="故事型">故事型（我的真實風格）</option>
<option value="人間清醒型">人間清醒型</option>
<option value="溫暖陪伴型">溫暖陪伴型</option>
</select>

<label>社群平台</label>
<select id="platform">
<option value="Facebook">Facebook</option>
<option value="Instagram">Instagram</option>
<option value="Threads">Threads</option>
</select>

<div class="btn-row">
<button class="btn btn-gold" onclick="generateCopy('Facebook')">📘 FB 長文版</button>
<button class="btn btn-gold" onclick="generateCopy('Instagram')">📷 IG 質感版</button>
<button class="btn btn-gold" onclick="generateCopy('Threads')">🧵 Threads 爆點版</button>
<button class="btn btn-dark" onclick="generateCopy()">🎲 隨機重抽</button>
<button class="btn btn-dark" onclick="copyText()">📋 複製文案</button>
</div>

<div class="output" id="output">
點擊上方按鈕開始生成你的專屬招募文案<br><br>
（可無限連點）
</div>
</div>
</section>

<script>
// ==================== 你的專屬資料 ====================
const hooks = {
"想翻身的人": [
    "39歲那年，我把開了9年的手機店親手關掉，狼狽從台北回到宜蘭。",
    "很多人以為失敗就是結束，但我把那段低谷當成清空錯誤賽道的機會。",
    "你不是能力不夠，你只是還沒找到能放大你銷售力和故事感的系統。"
],
"曾經失敗的人": [
    "失敗最痛的不是賠錢，而是每天問自己『我是不是真的不行』。",
    "我花了兩年才敢承認：以前的方向錯了，不是我錯了。",
    "曾經失敗過的人，其實擁有最強的翻身燃料。"
],
"業務型人格": [
    "你現場成交很強、很會聊天、很懂人性，但收入卻一直卡住。",
    "最可惜的業務型人格，就是一輩子只靠單一時間換錢。",
    "你的銷售力和故事感，是這個時代最稀缺的放大器。"
],
"上班族": ["每天準時上下班的人，不一定穩定。"],
"迷茫的人": ["忙了一整年，卻不知道自己到底在往哪裡走。"]
};

const emotions = {
不甘心: ["你最痛苦的，可能不是失敗，而是知道自己本來可以更好。"],
焦慮: ["你是不是也開始感覺，未來越來越不確定。"],
想改變: ["你已經不想再這樣過下去了，對吧？"],
迷茫: ["每天都很忙，但心裡其實沒有期待。"]
};

const personas = {
故事型: ["我不是在跟你畫大餅，我只是把走過的坑分享給你。"],
人間清醒型: ["不要再假裝現在很穩定，時間不會等你準備好。"],
溫暖陪伴型: ["你不用現在立刻變很厲害，先慢慢靠近新的環境，也是一種開始。"]
};

const endings = [
    "私訊我「翻身」，我給你一份專屬的 AI 時代收入定位方向。",
    "不用急著相信我，先了解一次，你會知道這是不是你要的下一條路。",
    "機會是給願意開始的人，而不是只會喊口號的人。"
];

function pick(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
}

// ==================== 生成核心 ====================
function generateCopy(targetPlatform = null) {
    if (targetPlatform) document.getElementById("platform").value = targetPlatform;
    
    const audience = document.getElementById("audience").value;
    const emotion = document.getElementById("emotion").value;
    const persona = document.getElementById("persona").value;
    const platform = document.getElementById("platform").value;

    const h = pick(hooks[audience] || hooks["想翻身的人"]);
    const e = pick(emotions[emotion] || emotions["不甘心"]);
    const p = pick(personas[persona] || personas["故事型"]);
    const end = pick(endings);

    let structure = "";

    if (platform === "Facebook") {
        structure = `【Facebook 長文版】\n\n${h}\n\n${e}\n\n我越來越發現，現在很多人的問題真的不是不努力。\n而是努力了很久，卻一直沒有進入一套能放大自己的系統。\n\n${p}\n\n很多人一聽到機會就防備，這很正常。\n但真正值得看的，是它能不能讓一個普通人重新看見希望。\n\n${end}`;
    } else if (platform === "Instagram") {
        structure = `【Instagram 質感版】\n\n${h}\n\n${e}\n\n真正的改變，不是突然暴富，而是你開始靠近新的圈層、新的思維。\n\n${p}\n\n${end}\n\n#人生翻身 #AI時代 #第二收入 #不想認命 #39歲翻身`;
    } else if (platform === "Threads") {
        structure = `【Threads 爆點版】\n\n${h}\n\n${e}\n\n真正高級的招募，不是叫你加入，而是讓你突然發現：你現在的人生模式，可能真的撐不起未來。\n\n${p}\n\n${end}`;
    }

    const output = document.getElementById("output");
    output.innerText = structure;
    output.scrollIntoView({ behavior: "smooth", block: "center" });

    // 高亮動畫
    output.style.transition = "all 0.4s";
    output.style.background = "rgba(216,180,106,.18)";
    setTimeout(() => output.style.background = "rgba(0,0,0,.28)", 700);
}

// 複製
function copyText() {
    navigator.clipboard.writeText(document.getElementById("output").innerText).then(() => {
        alert("✅ 文案已複製！");
    });
}

// 煥然專屬模式
function setHuanranMode() {
    document.getElementById("audience").value = "想翻身的人";
    document.getElementById("emotion").value = "不甘心";
    document.getElementById("persona").value = "故事型";
    document.getElementById("platform").value = "Facebook";
    generateCopy();
}

// 頁面載入完畢就自動生成一次
window.onload = () => {
    setHuanranMode();
};
</script>
</body>
</html>
